const TABS = [
  {key:"daily", icon:"☀"},
  {key:"emotion", icon:"♥"},
  {key:"stocks", icon:"↑"},
  {key:"family", icon:"★"},
];
const PER_PAGE = 15;

let state = {
  tab: "daily",
  flipped: {},
  favs: {},
  search: "",
  page: 0,
  showFavOnly: false,
};

function $(id){ return document.getElementById(id); }

function render(){
  const cat = DATA[state.tab];
  const q = state.search.trim().toLowerCase();
  const filtered = cat.items.filter((item, i) => {
    const key = state.tab + "-" + i;
    if(state.showFavOnly && !state.favs[key]) return false;
    if(!q) return true;
    return item.kr.includes(q) || item.en.toLowerCase().includes(q) || item.note.toLowerCase().includes(q);
  });
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if(state.page >= totalPages && totalPages > 0) state.page = 0;
  const pageItems = filtered.slice(state.page * PER_PAGE, (state.page+1) * PER_PAGE);
  const favCount = Object.values(state.favs).filter(Boolean).length;
  const total = Object.values(DATA).reduce((s,c) => s+c.items.length, 0);

  let html = `
    <h1>Jason & Emma's Real Life English <span class="badge">${total} expressions</span></h1>
    <p class="subtitle">실제 대화에서 뽑은 표현 · 카드를 눌러 영어 번역 + 응답 확인</p>
    <div class="tabs">
  `;
  TABS.forEach(t => {
    const c = DATA[t.key];
    const active = state.tab === t.key;
    html += `<button class="tab${active?" active":""}" onclick="switchTab('${t.key}')" style="${active?`background:${c.bg};color:${c.color};border-color:${c.color};`:""}">${t.icon} ${c.label} <span style="opacity:.6;font-size:11px">(${c.items.length})</span></button>`;
  });
  html += `</div>
    <div class="controls">
      <input id="search-input" type="text" placeholder="한국어 또는 영어로 검색..." value="${state.search.replace(/"/g,'&quot;')}" oninput="onSearch(this.value)">
      <button class="fav-btn-bar${state.showFavOnly?" active":""}" onclick="toggleFavFilter()">♥ ${favCount>0?"즐겨찾기 ("+favCount+")":"즐겨찾기"}</button>
    </div>
  `;

  if(filtered.length === 0){
    html += `<div class="empty">검색 결과가 없어요.</div>`;
  } else {
    html += `<div class="cards">`;
    pageItems.forEach(item => {
      const origIdx = cat.items.indexOf(item);
      const key = state.tab + "-" + origIdx;
      const isFlipped = !!state.flipped[key];
      const isFav = !!state.favs[key];
      html += `
        <div class="card" onclick="toggleCard('${key}')" style="border-color:${isFlipped?cat.color:"#e5e5e5"}">
          <button class="fav-star${isFav?" on":""}" onclick="toggleFav(event,'${key}')">♥</button>
          <div class="card-header">
            <span class="num" style="background:${cat.bg};color:${cat.color}">${origIdx+1}</span>
            <div style="flex:1">
              <div class="bubble-row">
                <div class="avatar" style="background:${cat.bg};color:${cat.color}">J</div>
                <div>
                  <div class="msg-ko">${item.kr}</div>
                  ${!isFlipped?`<div class="hint">눌러서 영어 표현 + 응답 보기 →</div>`:""}
                </div>
              </div>
              ${isFlipped?`
                <div class="translation-box" style="margin-left:36px;margin-top:6px">
                  <div class="msg-en" style="color:${cat.color}">${item.en}</div>
                  <div class="note-text">${item.note}</div>
                </div>
                <hr class="divider">
                <div class="bubble-row right">
                  <div class="avatar" style="background:#FBEAF0;color:#D4537E">E</div>
                  <div style="text-align:right">
                    <div class="msg-ko">${item.reply.kr}</div>
                    <div class="translation-box" style="margin-top:4px">
                      <div class="msg-en" style="color:#D4537E">${item.reply.en}</div>
                      <div class="note-text">${item.reply.note}</div>
                    </div>
                  </div>
                </div>
              `:""}
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if(totalPages > 1){
    html += `
      <div class="pagination">
        <button onclick="changePage(-1)" ${state.page===0?"disabled":""}>← 이전</button>
        <span>${state.page+1} / ${totalPages} (${filtered.length}개)</span>
        <button onclick="changePage(1)" ${state.page===totalPages-1?"disabled":""}>다음 →</button>
      </div>
    `;
  }
  html += `<div class="footer">${total}개 표현 · Jason & Emma 실제 대화에서 선별</div>`;
  $("app").innerHTML = html;
}

function switchTab(key){ state.tab=key; state.flipped={}; state.page=0; state.search=""; state.showFavOnly=false; render(); }
function toggleCard(key){ state.flipped[key]=!state.flipped[key]; render(); }
function toggleFav(e,key){ e.stopPropagation(); state.favs[key]=!state.favs[key]; render(); }
function toggleFavFilter(){ state.showFavOnly=!state.showFavOnly; state.page=0; render(); }
function onSearch(v){ state.search=v; state.page=0; render(); }
function changePage(d){ state.page+=d; render(); }

render();
</script>

</html>
